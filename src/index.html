<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Piano de uma oitava</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <button id="start" type="button">Iniciar áudio</button>
    <div id="status">Clique em "Iniciar áudio" para carregar os samples.</div>

    <div id="piano">
        <div class="key-group white-keys">
            <div class="key" data-note="C"><span class="keyhint">A</span></div>
            <div class="key" data-note="D"><span class="keyhint">S</span></div>
            <div class="key" data-note="E"><span class="keyhint">D</span></div>
            <div class="key" data-note="F"><span class="keyhint">F</span></div>
            <div class="key" data-note="G"><span class="keyhint">G</span></div>
            <div class="key" data-note="A"><span class="keyhint">H</span></div>
            <div class="key" data-note="B"><span class="keyhint">J</span></div>
        </div>
        <div class="key-group black-keys">
            <div class="key-subgroup">
                <div class="key black" data-note="C#"><span class="keyhint">W</span></div>
                <div class="key black" data-note="D#"><span class="keyhint">E</span></div>
            </div>
            <div class="key-subgroup">
                <div class="key black" data-note="F#"><span class="keyhint">T</span></div>
                <div class="key black" data-note="G#"><span class="keyhint">Y</span></div>
                <div class="key black" data-note="A#"><span class="keyhint">U</span></div>
            </div>
        </div>
    </div>

    <p class="hint">Use o mouse, toque ou o teclado (<kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> e <kbd>W</kbd> <kbd>E</kbd> <kbd>T</kbd> <kbd>Y</kbd> <kbd>U</kbd>).</p>

    <section id="metronome">
        <h2>Metrônomo</h2>
        <div class="metronome-row">
            <button id="metronome-toggle" type="button">Play</button>
            <label for="bpm">BPM</label>
            <input id="bpm" type="range" min="40" max="240" value="120">
            <span id="bpm-display">120</span>
            <label for="beats-per-bar">Compasso</label>
            <select id="beats-per-bar">
                <option value="2">2/4</option>
                <option value="3">3/4</option>
                <option value="4" selected>4/4</option>
                <option value="6">6/8</option>
            </select>
            <span class="beat-indicator" id="beat-indicator" aria-hidden="true"></span>
        </div>
    </section>

    <script type="module" src="js/main.js"></script>
</body>

</html>
