<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SeedSong — Procedural Music Generator</title>
    <meta name="description" content="Generate infinite piano melodies from a single seed number. Play, tweak, and export to MIDI or WAV — no install, no sign-up.">
    <meta property="og:title" content="SeedSong — Procedural Music Generator">
    <meta property="og:description" content="Generate infinite piano melodies from a single seed. Play, tweak, share, and export to MIDI or WAV.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chicomcastro.github.io/procedural-music-generator-web/">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SeedSong — Procedural Music Generator">
    <meta name="twitter:description" content="Generate infinite piano melodies from a single seed. Play, tweak, share, and export.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="hero">
        <h1>SeedSong</h1>
        <p class="tagline">Infinite piano melodies from a single seed number.</p>
        <p class="subtitle">Generate, play, tweak, and export — right in your browser.</p>
    </header>

    <button id="start" type="button">Start audio</button>
    <div id="status">Click "Start audio" to load samples.</div>

    <div id="piano-scroll">
        <div id="piano"></div>
    </div>

    <p class="hint">
        Mouse, touch, or keyboard (<kbd>A</kbd>–<kbd>J</kbd> white keys, <kbd>W</kbd> <kbd>E</kbd> <kbd>T</kbd> <kbd>Y</kbd> <kbd>U</kbd> black keys).
        Octave <span id="kbd-octave">3</span> &mdash; <kbd>Z</kbd>/<kbd>X</kbd> to shift.
    </p>

    <section id="metronome">
        <h2>Player</h2>
        <div class="metronome-row">
            <button id="metronome-toggle" type="button" title="Start or stop playback">Play</button>
            <label for="bpm" title="Beats per minute — how fast the music plays">BPM</label>
            <input id="bpm" type="range" min="40" max="240" value="110" title="Tempo: 40–240 BPM">
            <span id="bpm-display">110</span>
            <label for="beats-per-bar" title="Time signature — beats per bar">Time</label>
            <select id="beats-per-bar">
                <option value="2">2/4</option>
                <option value="3">3/4</option>
                <option value="4" selected>4/4</option>
                <option value="6">6/8</option>
            </select>
            <span class="beat-indicator" id="beat-indicator" aria-hidden="true"></span>
        </div>
        <div class="metronome-row">
            <label title="Audible metronome tick on each beat"><input type="checkbox" id="click-enabled"> Click track</label>
            <label title="Play the generated melody and chords"><input type="checkbox" id="song-enabled" checked> Procedural music</label>
        </div>
    </section>

    <section id="generator">
        <h2>Generator</h2>
        <div class="metronome-row">
            <button id="generate-btn" type="button" title="Create a new random melody">Generate new</button>
            <label for="tonic" title="Root note of the scale">Tonic</label>
            <select id="tonic">
                <option value="0" selected>C</option>
                <option value="1">C#</option>
                <option value="2">D</option>
                <option value="3">D#</option>
                <option value="4">E</option>
                <option value="5">F</option>
                <option value="6">F#</option>
                <option value="7">G</option>
                <option value="8">G#</option>
                <option value="9">A</option>
                <option value="10">A#</option>
                <option value="11">B</option>
            </select>
            <label for="scale" title="Musical scale — determines the mood and available notes">Scale</label>
            <select id="scale">
                <option value="major" selected>Major</option>
                <option value="natural_minor">Natural Minor</option>
                <option value="harmonic_minor">Harmonic Minor</option>
                <option value="dorian">Dorian</option>
                <option value="phrygian">Phrygian</option>
                <option value="lydian">Lydian</option>
                <option value="mixolydian">Mixolydian</option>
                <option value="pentatonic_major">Pentatonic Major</option>
                <option value="pentatonic_minor">Pentatonic Minor</option>
                <option value="blues">Blues</option>
            </select>
            <label for="bars" title="Length of the loop in bars">Bars</label>
            <select id="bars">
                <option value="2">2</option>
                <option value="4" selected>4</option>
                <option value="8">8</option>
            </select>
        </div>
        <div class="metronome-row">
            <label for="seed" title="A number that uniquely determines the melody — same seed = same song">Seed</label>
            <input id="seed" type="number" min="0" max="4294967295" step="1" title="Enter a seed to reproduce a specific melody">
            <button id="share-btn" type="button" title="Copy a shareable link with all current settings">Share</button>
            <span id="song-info" class="hint"></span>
        </div>
    </section>

    <section id="export">
        <h2>Export</h2>
        <div class="metronome-row">
            <button id="export-midi" type="button" title="Download as MIDI file — import into any DAW">Export MIDI</button>
            <button id="export-wav" type="button" title="Render to audio file (16-bit PCM WAV)">Export WAV</button>
            <span id="export-status" class="hint"></span>
        </div>
    </section>

    <script type="module" src="js/main.js"></script>
</body>

</html>
